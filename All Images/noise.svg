<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="semiCircleGrad">
      <stop offset="0%" style="stop-color:rgba(255,208,0,0.85);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,208,0,0);stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="parallelogramTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,208,0,0.65);stop-opacity:1" />
      <stop offset="40%" style="stop-color:rgba(255,208,0,0.48);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,208,0,0);stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="parallelogramBottomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,208,0,0.65);stop-opacity:1" />
      <stop offset="40%" style="stop-color:rgba(255,208,0,0.48);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,208,0,0);stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="triangle1Grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="10%" style="stop-color:rgba(255,208,0,0.65);stop-opacity:1" />
      <stop offset="20%" style="stop-color:rgba(255,208,0,0.48);stop-opacity:1" />
      <stop offset="55%" style="stop-color:rgba(255,208,0,0);stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="triangle4Grad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(210)">
      <stop offset="0%" style="stop-color:rgba(255,208,0,0.65);stop-opacity:1" />
      <stop offset="20%" style="stop-color:rgba(255,208,0,0.48);stop-opacity:1" />
      <stop offset="75%" style="stop-color:rgba(255,208,0,0);stop-opacity:1" />
    </linearGradient>
    
    <!-- Blur filters -->
    <filter id="blur8">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
    </filter>
    

  </defs>
  
  <g transform="translate(235, 348) rotate(-115)">
    <!-- 120 degree arc path: starts at 0deg, sweeps 120deg clockwise -->
    <path d="M 200,200 L 200,0 A 200,200 0 0,1 100,373.2 Z" 
          fill="url(#semiCircleGrad)" 
          filter="url(#blur8)"/>
  </g>
  
  <!-- Parallelogram Top (top: 63%, left: -12px, translateY -45%, rotate -25deg) -->
  <g transform="translate(-12, 414)">
    <g transform="rotate(-25)">
      <polygon points="30,0 270,0 300,100 0,100" 
               fill="url(#parallelogramTopGrad)" 
               opacity="0.75"/>
    </g>
  </g>
  
  <!-- Parallelogram Bottom (top: 71.5%, left: -42px, translateY -35%, rotate -25deg) -->
  <g transform="translate(-42, 544)">
    <g transform="rotate(-25)">
      <polygon points="20,0 280,0 300,50 0,50" 
               fill="url(#parallelogramBottomGrad)" 
               opacity="0.7"
               filter="url(#blur8)"/>
    </g>
  </g>
  
  <!-- Triangle 1 (top: 25%, right: 15%, width: 150px) -->
  <!-- right: 15% = 1200 * 0.85 = 1020, minus width/2 for center = 945 -->
  <g transform="translate(945, 200)">
    <g transform="rotate(-7)">
      <polygon points="0,150 0,0 150,105" 
               fill="url(#triangle1Grad)" 
               opacity="0.75"/>
    </g>
  </g>
  
  <!-- Triangle 2 (top: 15%, right: 10%, width: 50px) -->
  <g transform="translate(1125, 120)">
    <g transform="rotate(-60)">
      <polygon points="0,50 0,0 50,35" 
               fill="#ffd000" 
               opacity="0.75"/>
    </g>
  </g>
  
  <!-- Triangle 3 (top: 30%, right: 20%, width: 30px) -->
  <g transform="translate(945, 240)">
    <g transform="rotate(-60)">
      <polygon points="0,30 0,0 30,21" 
               fill="#ffd000" 
               opacity="0.75"/>
    </g>
  </g>
  
  <!-- Triangle 4 (top: 44%, right: 10%, width: 50px) -->
  <g transform="translate(1125, 352)">
    <g transform="rotate(-60)">
      <polygon points="0,50 0,0 50,35" 
               fill="url(#triangle4Grad)" 
               opacity="0.75"/>
    </g>
  </g>
  
  <!-- Plus 1 (top: 13%, right: 25%) -->
  <g transform="translate(880, 104)" opacity="0.75">
    <rect x="8" y="0" width="4" height="20" fill="#ffd000"/>
    <rect x="0" y="8" width="20" height="4" fill="#ffd000"/>
  </g>
  
  <!-- Plus 2 (top: 25%, right: 30%) -->
  <g transform="translate(820, 200)" opacity="0.75">
    <rect x="8" y="0" width="4" height="20" fill="#ffd000"/>
    <rect x="0" y="8" width="20" height="4" fill="#ffd000"/>
  </g>
  
  <!-- Plus 3 (top: 60%, right: 10%) -->
  <g transform="translate(1060, 480)" opacity="0.75">
    <rect x="8" y="0" width="4" height="20" fill="#ffd000"/>
    <rect x="0" y="8" width="20" height="4" fill="#ffd000"/>
  </g>
  
  <!-- Plus 4 (top: 45%, left: 3) -->
  <g transform="translate(3, 360)" opacity="0.75">
    <rect x="8" y="0" width="4" height="20" fill="#ffd000"/>
    <rect x="0" y="8" width="20" height="4" fill="#ffd000"/>
  </g>
</svg>
